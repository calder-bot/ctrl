<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Delayed Gratification</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    color: #ccc;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    flex-shrink: 0;
    border-bottom: 1px solid #222;
  }

  #top-bar .title {
    font-size: 13px;
    color: #666;
    letter-spacing: 1px;
    text-transform: uppercase;
  }


  #canvas-container {
    flex: 1;
    position: relative;
    min-height: 100px;
    overflow: hidden;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }

  #controls {
    padding: 14px 16px;
    padding-bottom: max(14px, env(safe-area-inset-bottom, 14px));
    flex-shrink: 0;
    border-top: 1px solid #222;
  }

  #slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #gratification-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 8px;
    background: #222;
    border-radius: 4px;
    outline: none;
    touch-action: pan-x;
  }

  #gratification-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ff6b8a;
    cursor: pointer;
    border: 2px solid #000;
    box-shadow: 0 0 8px rgba(255, 107, 138, 0.4);
  }

  #gratification-slider::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #ff6b8a;
    cursor: pointer;
    border: 2px solid #000;
    box-shadow: 0 0 8px rgba(255, 107, 138, 0.4);
  }



  button {
    width: 44px;
    height: 44px;
    border: 1px solid #333;
    background: #111;
    color: #ccc;
    font-size: 20px;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
    line-height: 1;
  }

  button:hover { background: #1a1a1a; border-color: #444; }
  button:active { background: #222; }
  button#btn-action { border-color: #ff6b8a; color: #ff6b8a; }
  button#btn-action:hover { background: #1a0a0f; }
  button#btn-clear {
    font-size: 14px;
    width: 32px;
    height: 32px;
    color: #555;
    border-color: #222;
    background: transparent;
    margin-left: 8px;
  }
  button#btn-clear:hover { color: #ff6b8a; border-color: #444; }

  @media (max-width: 600px) {
    #top-bar {
      padding: 8px 12px;
      flex-wrap: wrap;
      gap: 4px;
    }
    #top-bar .title { font-size: 10px; }
    #controls { padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom, 10px)); }
  }
</style>
</head>
<body>

<div id="top-bar">
  <div class="title">Delayed Gratification</div>
  <button id="btn-clear">&empty;</button>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<div id="controls">
  <div id="slider-row">
    <button id="btn-action">&#9654;</button>
    <input type="range" id="gratification-slider" min="0" max="100" value="50">
  </div>
</div>

<script>
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var slider = document.getElementById('gratification-slider');
var btnAction = document.getElementById('btn-action');
var btnClear = document.getElementById('btn-clear');

// --- Simulation parameters ---
var MAX_EPOCH = 100;
var EPOCH_DURATION = 15; // seconds — wall-clock time for one full epoch
var EPOCH_RATE = MAX_EPOCH / EPOCH_DURATION; // epoch units per second
var SIM_DT = 0.05; // internal simulation step size (epoch units)
var LPF_TAU = 0.5; // low-pass filter time constant in seconds

// --- State ---
var STATE_READY = 0;
var STATE_RUNNING = 1;
var STATE_DONE = 2;
var simState = STATE_READY;
var epoch = 0;
var gratification = 50;      // raw slider value
var gratFiltered = 50;        // low-pass filtered value (drives the model)
var capital = 20;
var cumulativeScore = 0;
var lastFrameTime = 0;        // for delta-time calculation

var life = {
  epochs: [], gratification: [], capital: [],
  upperBand: [], lowerBand: [], wellness: [], score: []
};

var pastRuns = [];

// --- Life Capital Model ---
// Compounding logistic growth: capital grows proportional to itself (compound
// interest), saturating near 100. Early building creates exponential advantage.
// Investment flow: triangle peaking at g=25 (distance from 25 determines growth).
// Aging: base decay + peakTime-based aging (kicks in earlier for higher g).
// Wellness: sqrt(g) mapping — concave in gratification, linear in capital.

var BASE_FLOW = 0.02;    // baseline compounding rate
var BONUS_FLOW = 0.10;   // extra compounding at optimal g=25
var BASE_AGING = 0.0005; // natural capital decay
var AGING_K = 0.015;     // peakTime-based aging coefficient

function investmentFlow(grat) {
  var d = Math.abs(grat - 25);
  return BASE_FLOW + BONUS_FLOW * Math.max(0, 1 - d / 75);
}

function agingRate(epoch, grat) {
  var peakTime = 100 - grat;
  var timePastPeak = Math.max(0, (epoch - peakTime) / 100);
  return BASE_AGING + AGING_K * timePastPeak;
}

function updateCapital(epoch, grat, capital, dt) {
  var flow = investmentFlow(grat);
  var aging = agingRate(epoch, grat);
  // Compounding logistic: growth proportional to capital itself
  var dC = flow * capital * (1 - capital / 100) - aging * capital;
  return Math.max(0.1, Math.min(100, capital + dC * dt));
}

function getBands(capital) {
  // Band: lower = 20% of capital, upper = capital
  var upper = capital;
  var lower = 0.2 * capital;
  return { upper: upper, lower: lower };
}

function getWellness(grat, upper, lower) {
  // Concave in gratification (sqrt), linear in capital
  var gFrac = Math.sqrt(grat / 100);
  return lower + gFrac * (upper - lower);
}

// --- Canvas setup ---
function resizeCanvas() {
  var container = document.getElementById('canvas-container');
  var rect = container.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

// --- Drawing ---
var COLORS = {
  bg: '#000000',
  grid: '#111111',
  gridText: '#333333',
  upperBand: '#3a3a5c',
  lowerBand: '#3a3a5c',
  bandFill: 'rgba(58, 58, 92, 0.15)',
  wellness: '#ff4466',
  wellnessArea: 'rgba(255, 68, 102, 0.12)',
  gratTrace: '#ff6b8a',
  pastRun: [
    'rgba(100, 140, 255, 0.35)',
    'rgba(100, 255, 140, 0.35)',
    'rgba(255, 200, 100, 0.35)',
    'rgba(200, 100, 255, 0.35)',
    'rgba(100, 255, 255, 0.35)',
    'rgba(255, 150, 180, 0.35)',
  ],
  pastRunArea: [
    'rgba(100, 140, 255, 0.08)',
    'rgba(100, 255, 140, 0.08)',
    'rgba(255, 200, 100, 0.08)',
    'rgba(200, 100, 255, 0.08)',
    'rgba(100, 255, 255, 0.08)',
    'rgba(255, 150, 180, 0.08)',
  ],
};

function getPlotArea() {
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.width / dpr;
  var h = canvas.height / dpr;
  return {
    left: 36,
    right: w - 12,
    top: 12,
    bottom: h - 22,
    width: w - 48,
    height: h - 34
  };
}

function epochToX(e, plot) {
  return plot.left + (e / MAX_EPOCH) * plot.width;
}

function valToY(v, plot) {
  return plot.bottom - (v / 100) * plot.height;
}

function drawGrid(plot) {
  ctx.strokeStyle = COLORS.grid;
  ctx.lineWidth = 1;
  ctx.fillStyle = COLORS.gridText;
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';

  for (var v = 0; v <= 100; v += 25) {
    var y = valToY(v, plot);
    ctx.beginPath();
    ctx.moveTo(plot.left, y);
    ctx.lineTo(plot.right, y);
    ctx.stroke();
    ctx.fillText(v.toString(), plot.left - 4, y + 3);
  }

  ctx.textAlign = 'center';
  for (var e = 0; e <= MAX_EPOCH; e += 20) {
    var x = epochToX(e, plot);
    ctx.beginPath();
    ctx.moveTo(x, plot.top);
    ctx.lineTo(x, plot.bottom);
    ctx.stroke();
    ctx.fillText(e.toString(), x, plot.bottom + 14);
  }
}

function drawRunPath(run, plot, color, areaColor, lineWidth) {
  if (run.epochs.length < 2) return;

  ctx.beginPath();
  ctx.moveTo(epochToX(run.epochs[0], plot), valToY(0, plot));
  for (var i = 0; i < run.epochs.length; i++) {
    ctx.lineTo(epochToX(run.epochs[i], plot), valToY(run.wellness[i], plot));
  }
  ctx.lineTo(epochToX(run.epochs[run.epochs.length - 1], plot), valToY(0, plot));
  ctx.closePath();
  ctx.fillStyle = areaColor;
  ctx.fill();

  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  for (var i = 0; i < run.epochs.length; i++) {
    var x = epochToX(run.epochs[i], plot);
    var y = valToY(run.wellness[i], plot);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function drawCurrentRun(plot) {
  if (life.epochs.length < 2) return;

  // Band fill
  ctx.beginPath();
  for (var i = 0; i < life.epochs.length; i++) {
    var x = epochToX(life.epochs[i], plot);
    var y = valToY(life.upperBand[i], plot);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  for (var i = life.epochs.length - 1; i >= 0; i--) {
    ctx.lineTo(epochToX(life.epochs[i], plot), valToY(life.lowerBand[i], plot));
  }
  ctx.closePath();
  ctx.fillStyle = COLORS.bandFill;
  ctx.fill();

  // Upper band
  ctx.beginPath();
  ctx.strokeStyle = COLORS.upperBand;
  ctx.lineWidth = 1.5;
  for (var i = 0; i < life.epochs.length; i++) {
    var x = epochToX(life.epochs[i], plot);
    var y = valToY(life.upperBand[i], plot);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Lower band
  ctx.beginPath();
  ctx.strokeStyle = COLORS.lowerBand;
  ctx.lineWidth = 1.5;
  for (var i = 0; i < life.epochs.length; i++) {
    var x = epochToX(life.epochs[i], plot);
    var y = valToY(life.lowerBand[i], plot);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Wellness area
  ctx.beginPath();
  ctx.moveTo(epochToX(life.epochs[0], plot), valToY(0, plot));
  for (var i = 0; i < life.epochs.length; i++) {
    ctx.lineTo(epochToX(life.epochs[i], plot), valToY(life.wellness[i], plot));
  }
  ctx.lineTo(epochToX(life.epochs[life.epochs.length - 1], plot), valToY(0, plot));
  ctx.closePath();
  ctx.fillStyle = COLORS.wellnessArea;
  ctx.fill();

  // Wellness line
  ctx.beginPath();
  ctx.strokeStyle = COLORS.wellness;
  ctx.lineWidth = 2;
  for (var i = 0; i < life.epochs.length; i++) {
    var x = epochToX(life.epochs[i], plot);
    var y = valToY(life.wellness[i], plot);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Gratification trace (dashed, scaled to bottom 30%)
  ctx.beginPath();
  ctx.strokeStyle = COLORS.gratTrace;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  for (var i = 0; i < life.epochs.length; i++) {
    var x = epochToX(life.epochs[i], plot);
    var y = valToY(life.gratification[i] * 0.3, plot);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Current position dot
  if (simState === STATE_RUNNING && life.epochs.length > 0) {
    var lastIdx = life.epochs.length - 1;
    var cx = epochToX(life.epochs[lastIdx], plot);
    var cy = valToY(life.wellness[lastIdx], plot);

    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 68, 102, 0.3)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.wellness;
    ctx.fill();
  }
}

function drawScores(plot) {
  if (pastRuns.length === 0 && life.epochs.length === 0) return;

  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  var y = plot.top + 16;

  for (var i = 0; i < pastRuns.length; i++) {
    var run = pastRuns[i];
    var colorIdx = i % COLORS.pastRun.length;
    ctx.fillStyle = COLORS.pastRun[colorIdx].replace('0.35', '0.7');
    var score = run.score[run.score.length - 1] || 0;
    ctx.fillText(Math.round(score), plot.right - 4, y);
    y += 16;
  }

  if (life.epochs.length > 0) {
    ctx.fillStyle = COLORS.wellness;
    ctx.fillText(Math.round(cumulativeScore), plot.right - 4, y);
  }
}

function draw() {
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.width / dpr;
  var h = canvas.height / dpr;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, w, h);

  var plot = getPlotArea();
  drawGrid(plot);

  for (var i = 0; i < pastRuns.length; i++) {
    var colorIdx = i % COLORS.pastRun.length;
    drawRunPath(pastRuns[i], plot, COLORS.pastRun[colorIdx], COLORS.pastRunArea[colorIdx], 1.5);
  }

  drawCurrentRun(plot);
  drawScores(plot);
}

// --- Simulation ---
function recordState() {
  var bands = getBands(capital);
  var wellness = getWellness(gratFiltered, bands.upper, bands.lower);

  life.epochs.push(epoch);
  life.gratification.push(gratFiltered);
  life.capital.push(capital);
  life.upperBand.push(bands.upper);
  life.lowerBand.push(bands.lower);
  life.wellness.push(wellness);
  life.score.push(cumulativeScore);
}

function tick(timestamp) {
  if (simState !== STATE_RUNNING) return;

  // Calculate real elapsed time since last frame
  if (lastFrameTime === 0) lastFrameTime = timestamp;
  var dtSeconds = Math.min((timestamp - lastFrameTime) / 1000, 0.1); // cap at 100ms to prevent jumps
  lastFrameTime = timestamp;

  // Low-pass filter — frame-rate independent
  var lpfAlpha = 1 - Math.exp(-dtSeconds / LPF_TAU);
  gratFiltered += lpfAlpha * (gratification - gratFiltered);

  // Advance epoch proportional to real time
  var epochAdvance = EPOCH_RATE * dtSeconds;
  var epochRemaining = epochAdvance;

  while (epochRemaining > 0) {
    var step = Math.min(SIM_DT, epochRemaining);
    if (epoch >= MAX_EPOCH) {
      finishRun();
      return;
    }

    capital = updateCapital(epoch, gratFiltered, capital, step);
    var bands = getBands(capital);
    var wellness = getWellness(gratFiltered, bands.upper, bands.lower);
    cumulativeScore += wellness * step;
    epoch += step;
    epochRemaining -= step;

    if (life.epochs.length === 0 || epoch - life.epochs[life.epochs.length - 1] >= 0.4) {
      recordState();
    }
  }

  updateDisplays();
  draw();
  requestAnimationFrame(tick);
}

function updateDisplays() {
  // Stats removed — score legends on the chart are sufficient
}

function finishRun() {
  simState = STATE_DONE;
  epoch = MAX_EPOCH;
  recordState();
  updateDisplays();
  draw();
  pastRuns.push(JSON.parse(JSON.stringify(life)));
  // Switch to play icon (ready for next run)
  btnAction.innerHTML = '&#9654;';
}

function startRun() {
  // Reset state for a new run
  epoch = 0;
  capital = 20;
  gratification = parseInt(slider.value);
  gratFiltered = gratification;
  cumulativeScore = 0;
  life = {
    epochs: [], gratification: [], capital: [],
    upperBand: [], lowerBand: [], wellness: [], score: []
  };
  recordState();
  simState = STATE_RUNNING;
  lastFrameTime = 0; // reset so first frame computes fresh delta
  // Switch to reset icon
  btnAction.innerHTML = '&#8634;';
  updateDisplays();
  requestAnimationFrame(tick);
}

function clearAll() {
  simState = STATE_READY;
  epoch = 0;
  capital = 20;
  gratification = parseInt(slider.value);
  gratFiltered = gratification;
  cumulativeScore = 0;
  life = {
    epochs: [], gratification: [], capital: [],
    upperBand: [], lowerBand: [], wellness: [], score: []
  };
  pastRuns = [];
  btnAction.innerHTML = '&#9654;';
  updateDisplays();
  draw();
}

// --- Events ---
slider.addEventListener('input', function(e) {
  gratification = parseInt(e.target.value);
  if (simState !== STATE_RUNNING) {
    updateDisplays();
    draw();
  }
});

slider.addEventListener('change', function(e) {
  gratification = parseInt(e.target.value);
});

btnAction.addEventListener('click', function() {
  if (simState === STATE_RUNNING) {
    // Reset: abort current run, start fresh
    startRun();
  } else {
    // Ready or Done: start a new run
    startRun();
  }
});

btnClear.addEventListener('click', clearAll);

// Touch support for buttons
[btnAction, btnClear].forEach(function(btn) {
  btn.addEventListener('touchend', function(e) {
    e.preventDefault();
    btn.click();
  });
});

// --- Init ---
updateDisplays();
draw();
</script>
</body>
</html>
