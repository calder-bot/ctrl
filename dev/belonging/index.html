<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Belonging</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }
  canvas {
    flex: 1;
    width: 100%;
    display: block;
    touch-action: none;
  }
  #slider-wrap {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 32px;
    padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
  }
  #openness {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    max-width: 360px;
    height: 10px;
    background: linear-gradient(90deg, #1a1a1a 0%, #2a1a2e 100%);
    border-radius: 5px;
    outline: none;
    touch-action: pan-x;
    pointer-events: auto;
    transition: background 0.3s;
  }
  #openness::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 38%, #f0f0f0, #c0c0c0);
    cursor: pointer;
    border: 3px solid #000;
    box-shadow: 0 0 12px rgba(200, 200, 200, 0.15);
    transition: box-shadow 0.2s;
  }
  #openness::-moz-range-thumb {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 38%, #f0f0f0, #c0c0c0);
    cursor: pointer;
    border: 3px solid #000;
    box-shadow: 0 0 12px rgba(200, 200, 200, 0.15);
  }
  @media (max-width: 600px) {
    #slider-wrap { padding: 16px 24px; }
    #openness { max-width: 300px; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="slider-wrap">
  <input type="range" id="openness" min="0" max="100" value="25">
</div>

<script>
(function() {
  // --- DOM ---
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var slider = document.getElementById('openness');
  var dpr = window.devicePixelRatio || 1;

  var W, H, minDim;

  function resize() {
    var rect = canvas.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    minDim = Math.min(W, H);
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // --- Scaling (match CTRL dot sizes) ---
  function personRadius() { return Math.max(5, minDim * 0.012); }
  function playerRadius() { return Math.max(5, minDim * 0.014); }
  function proxRadius() { return minDim * 0.12; }

  // --- State ---
  var noveltyBar = 0;
  var connectionBar = 0;
  var energyBar = 1;

  var player = { x: 0, y: 0, tx: 0, ty: 0, vx: 0, vy: 0, value: 0.5 };
  var people = [];
  var NUM_PEOPLE = 35;

  function openness() { return slider.value / 100; }

  // --- Seeded RNG ---
  var seed = 71;
  function srand() {
    seed = (seed * 16807 + 0) % 2147483647;
    return (seed - 1) / 2147483646;
  }

  function compatibility(a, b) {
    return 1 - Math.abs(a.value - b.value);
  }

  // 5 archetype centers — player is 0.5, compatible with group 3
  var ARCHETYPES = [0.08, 0.28, 0.5, 0.72, 0.92];
  var ARCHETYPE_NOISE = 0.06; // ± noise around center
  var NUM_STRAYS = 4; // truly random dots that don't belong

  function generateWorld() {
    seed = 71;
    people = [];

    // Assign dots to archetypes: ~6 per group + strays
    var dotsPerGroup = Math.floor((NUM_PEOPLE - NUM_STRAYS) / ARCHETYPES.length);

    for (var g = 0; g < ARCHETYPES.length; g++) {
      var count = (g === ARCHETYPES.length - 1)
        ? (NUM_PEOPLE - NUM_STRAYS - g * dotsPerGroup)
        : dotsPerGroup;
      for (var i = 0; i < count; i++) {
        var val = ARCHETYPES[g] + (srand() - 0.5) * ARCHETYPE_NOISE * 2;
        val = Math.max(0, Math.min(1, val));
        // Social capacity: how many nearby people they want (2-7)
        // High = gravitates to center of cluster, low = edges/periphery
        var socCap = 2 + Math.floor(srand() * 6);
        people.push({
          x: 0.1 * W + srand() * 0.8 * W,
          y: 0.1 * H + srand() * 0.8 * H,
          vx: 0, vy: 0,
          value: val,
          socialCap: socCap,
          archetype: g,
          conn: 0,
          noveltyLeft: 1.0,
          revealAlpha: 0,
          seenTint: 0,
          phase: srand() * Math.PI * 2,
          breathSpeed: 0.4 + srand() * 0.5,
          walkAngle: srand() * Math.PI * 2,
          walkTimer: srand() * 3
        });
      }
    }

    // Strays — truly random values
    for (var i = 0; i < NUM_STRAYS; i++) {
      var val = srand();
      var socCap = 1 + Math.floor(srand() * 3); // strays are less social (1-3)
      people.push({
        x: 0.1 * W + srand() * 0.8 * W,
        y: 0.1 * H + srand() * 0.8 * H,
        vx: 0, vy: 0,
        value: val,
        socialCap: socCap,
        archetype: -1,
        conn: 0,
        noveltyLeft: 1.0,
        revealAlpha: 0,
        seenTint: 0,
        phase: srand() * Math.PI * 2,
        breathSpeed: 0.4 + srand() * 0.5,
        walkAngle: srand() * Math.PI * 2,
        walkTimer: srand() * 3
      });
    }

    // Player starts near center
    player.x = W * 0.5 + (srand() - 0.5) * W * 0.1;
    player.y = H * 0.45 + (srand() - 0.5) * H * 0.1;
    player.tx = player.x;
    player.ty = player.y;
    player.vx = 0;
    player.vy = 0;

    noveltyBar = 0;
    connectionBar = 0;
    energyBar = 1;
  }

  // --- Distance helper ---
  function dist(ax, ay, bx, by) {
    var dx = ax - bx, dy = ay - by;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // --- Input ---
  var dragging = false;

  canvas.addEventListener('pointerdown', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    player.tx = e.clientX - rect.left;
    player.ty = e.clientY - rect.top;
    dragging = true;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', function(e) {
    if (dragging) {
      var rect = canvas.getBoundingClientRect();
      player.tx = e.clientX - rect.left;
      player.ty = e.clientY - rect.top;
    }
  });
  canvas.addEventListener('pointerup', function() { dragging = false; });
  canvas.addEventListener('pointercancel', function() { dragging = false; });

  slider.addEventListener('pointerdown', function(e) { e.stopPropagation(); });

  // --- Physics constants (tuned for 5 distinct clusters + strays) ---
  var ATTRACT_STRENGTH = 0.06;
  var REPEL_STRENGTH = 0.05;
  var RANDOM_WALK_STRENGTH = 0.12;
  var EDGE_REPULSION_STRENGTH = 0.4;
  var OVERLAP_REPULSION = 1.5;
  var FRICTION = 0.95;
  var MAX_DOT_SPEED_PX; // set on resize

  // --- Physics for all dots ---
  function updatePhysics(dt) {
    if (dt <= 0 || dt > 0.1) dt = 1 / 60;
    MAX_DOT_SPEED_PX = minDim * 0.15;
    var pRad = personRadius();
    var minSep = pRad * 3; // minimum separation between dots

    for (var i = 0; i < people.length; i++) {
      var a = people[i];
      var fx = 0, fy = 0;

      // Count similar neighbors for social capacity check
      var similarNearby = 0;
      var socialRange = minDim * 0.12;
      for (var k = 0; k < people.length; k++) {
        if (k === i) continue;
        var sim2 = 1 - Math.abs(a.value - people[k].value);
        if (sim2 > 0.85 && dist(a.x, a.y, people[k].x, people[k].y) < socialRange) {
          similarNearby++;
        }
      }
      // How "full" is this dot's social capacity? >1 means oversaturated
      var socialFullness = similarNearby / a.socialCap;

      // --- Inter-dot forces ---
      for (var j = 0; j < people.length; j++) {
        if (i === j) continue;
        var b = people[j];
        var dx = b.x - a.x;
        var dy = b.y - a.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < 1) d = 1;
        var nx = dx / d;
        var ny = dy / d;

        var sim = 1 - Math.abs(a.value - b.value); // 0-1 similarity

        // Short-range overlap repulsion (always)
        if (d < minSep) {
          var overlapForce = OVERLAP_REPULSION * (1 - d / minSep);
          fx -= nx * overlapForce;
          fy -= ny * overlapForce;
        }

        // Attraction: only between very similar dots (same archetype)
        if (sim > 0.85) {
          var attractRange = minDim * 0.5;
          if (d < attractRange && d > minSep) {
            var strength = ATTRACT_STRENGTH * (sim - 0.85) / 0.15;
            // Social capacity modulates attraction:
            // Under-saturated: full attraction
            // Over-saturated: attraction drops to zero, mild repulsion
            var socialMod = Math.max(0, 1 - socialFullness);
            strength *= socialMod;
            // If oversaturated, gently push away same-type dots
            if (socialFullness > 1.0 && d < socialRange) {
              var pushback = 0.02 * (socialFullness - 1.0);
              fx -= nx * pushback;
              fy -= ny * pushback;
            } else {
              var distFactor = Math.pow(1 - d / attractRange, 0.7);
              fx += nx * strength * distFactor;
              fy += ny * strength * distFactor;
            }
          }
        }

        // Repulsion between different dots (different archetypes)
        if (sim < 0.7) {
          var repelRange = minDim * 0.25;
          if (d < repelRange) {
            var diff = (0.7 - sim) / 0.7;
            var distFactor = Math.pow(1 - d / repelRange, 0.7);
            fx -= nx * REPEL_STRENGTH * diff * distFactor;
            fy -= ny * REPEL_STRENGTH * diff * distFactor;
          }
        }
      }

      // --- Edge repulsion (soft boundary) ---
      var edgeMargin = Math.max(W, H) * 0.1;
      if (a.x < edgeMargin) {
        fx += EDGE_REPULSION_STRENGTH * (1 - a.x / edgeMargin);
      }
      if (a.x > W - edgeMargin) {
        fx -= EDGE_REPULSION_STRENGTH * (1 - (W - a.x) / edgeMargin);
      }
      if (a.y < edgeMargin) {
        fy += EDGE_REPULSION_STRENGTH * (1 - a.y / edgeMargin);
      }
      if (a.y > H - edgeMargin) {
        fy -= EDGE_REPULSION_STRENGTH * (1 - (H - a.y) / edgeMargin);
      }

      // --- Random walk (gentle drift) ---
      a.walkTimer -= dt;
      if (a.walkTimer <= 0) {
        a.walkAngle += (Math.random() - 0.5) * Math.PI * 0.5;
        a.walkTimer = 2 + Math.random() * 4;
      }
      // Smooth the walk angle into force rather than snapping
      // Less social dots wander more (they're not anchored to big groups)
      var wanderMod = 0.5 + (1 - a.socialCap / 7) * 0.8;
      fx += Math.cos(a.walkAngle) * RANDOM_WALK_STRENGTH * wanderMod;
      fy += Math.sin(a.walkAngle) * RANDOM_WALK_STRENGTH * wanderMod;

      // --- Apply forces ---
      a.vx += fx * dt * 60;
      a.vy += fy * dt * 60;

      // Speed limit — less social dots move slightly faster (less anchored)
      var maxSpd = MAX_DOT_SPEED_PX * (0.4 + wanderMod * 0.6);
      var spd = Math.sqrt(a.vx * a.vx + a.vy * a.vy);
      if (spd > maxSpd) {
        a.vx *= maxSpd / spd;
        a.vy *= maxSpd / spd;
      }

      // Friction
      a.vx *= FRICTION;
      a.vy *= FRICTION;

      // Integrate
      a.x += a.vx * dt;
      a.y += a.vy * dt;

      // Hard clamp (safety net — edge repulsion should handle it)
      a.x = Math.max(pRad, Math.min(W - pRad, a.x));
      a.y = Math.max(pRad, Math.min(H - pRad, a.y));
    }
  }

  // --- Player movement ---
  function updatePlayer(dt) {
    if (dt <= 0 || dt > 0.1) dt = 1 / 60;

    var energyMult = 0.3 + energyBar * 0.7;
    var dx = player.tx - player.x;
    var dy = player.ty - player.y;
    var d = Math.sqrt(dx * dx + dy * dy);

    if (d > 0.5) {
      var stiffness = 4.5 * energyMult;
      var damping = 6.0;
      player.vx += (dx * stiffness - player.vx * damping) * dt;
      player.vy += (dy * stiffness - player.vy * damping) * dt;

      var maxSpeed = minDim * 0.9 * energyMult; // 1.5x faster than max dot
      var speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
      if (speed > maxSpeed) {
        player.vx *= maxSpeed / speed;
        player.vy *= maxSpeed / speed;
      }
    } else {
      player.vx *= 0.85;
      player.vy *= 0.85;
    }

    player.x += player.vx * dt;
    player.y += player.vy * dt;

    var pr = playerRadius();
    player.x = Math.max(pr, Math.min(W - pr, player.x));
    player.y = Math.max(pr, Math.min(H - pr, player.y));
  }

  // --- Game logic ---
  function updateGameLogic(dt) {
    if (dt <= 0 || dt > 0.1) dt = 1 / 60;

    var o = openness();
    var pr = proxRadius();

    // --- Find nearby people ---
    var nearby = [];
    for (var i = 0; i < people.length; i++) {
      var dd = dist(player.x, player.y, people[i].x, people[i].y);
      if (dd < pr) nearby.push({ i: i, d: dd });
    }
    var alone = nearby.length === 0;

    // --- Reveal / hide compatibility color ---
    for (var i = 0; i < people.length; i++) {
      var p = people[i];
      var dd = dist(player.x, player.y, p.x, p.y);
      if (dd < pr) {
        // Reveal — fade in
        var prox = 1 - dd / pr;
        p.revealAlpha = Math.min(1, p.revealAlpha + 2.5 * dt * prox);
        p.seenTint = Math.max(p.seenTint, 0.15); // once seen, faint tint remains
      } else {
        // Fade out — but keep seenTint as floor
        p.revealAlpha = Math.max(p.seenTint, p.revealAlpha - 0.8 * dt);
      }
    }

    // --- Novelty ---
    for (var j = 0; j < nearby.length; j++) {
      var p = people[nearby[j].i];
      var prox = 1 - nearby[j].d / pr;
      var take = 0.7 * prox * dt;
      if (p.noveltyLeft > 0) {
        var taken = Math.min(take, p.noveltyLeft);
        p.noveltyLeft -= taken;
        noveltyBar = Math.min(1, noveltyBar + taken * 0.06);
      }
    }
    noveltyBar = Math.max(0, noveltyBar - 0.003 * dt);

    // --- Connection ---
    var connThreshold = 0.45;
    var compatThreshold = 0.3;
    for (var j = 0; j < nearby.length; j++) {
      var p = people[nearby[j].i];
      var prox = 1 - nearby[j].d / pr;
      var compat = compatibility(player, p);

      if (o > connThreshold && compat > compatThreshold && energyBar > 0.02) {
        var rate = 0.18 * prox * compat * (o - connThreshold + 0.05) * dt;
        p.conn = Math.min(compat, p.conn + rate); // capped by compatibility
      }
    }

    // Connection decay for distant people
    for (var i = 0; i < people.length; i++) {
      var dd = dist(player.x, player.y, people[i].x, people[i].y);
      if (dd > pr * 1.5) {
        people[i].conn = Math.max(0, people[i].conn - 0.012 * dt);
      }
    }

    // Connection bar = mean of top 4 connections
    var sorted = [];
    for (var i = 0; i < people.length; i++) sorted.push(people[i].conn);
    sorted.sort(function(a, b) { return b - a; });
    var topN = 4;
    var cSum = 0;
    for (var i = 0; i < topN && i < sorted.length; i++) cSum += sorted[i];
    connectionBar = cSum / topN;

    // --- Energy ---
    if (alone) {
      energyBar = Math.min(1, energyBar + 0.06 * dt);
    } else {
      var drain = 0;
      for (var j = 0; j < nearby.length; j++) {
        var p = people[nearby[j].i];
        var prox = 1 - nearby[j].d / pr;
        var compat = compatibility(player, p);

        if (o > 0.25) {
          // High openness + low compatibility = heavy drain
          // High openness + high compatibility = low drain or slight gain
          var connBenefit = p.conn * 1.3;
          var compatDrainMod = Math.max(0, 1 - compat * 1.2);
          var personDrain = o * compatDrainMod * prox;
          drain += personDrain;
          // Slight energy gain from high-connection high-compat people
          if (p.conn > 0.4 && compat > 0.6) {
            drain -= p.conn * 0.2 * prox * o;
          }
        } else {
          // Low openness = mild performing drain
          drain += 0.08 * prox;
        }
      }
      energyBar = Math.max(0, Math.min(1, energyBar - drain * 0.07 * dt));
    }
  }

  // --- Rendering ---
  function lerp(a, b, t) { return a + (b - a) * t; }

  function drawPeople(time) {
    var pRad = personRadius();

    for (var i = 0; i < people.length; i++) {
      var p = people[i];
      var compat = compatibility(player, p);
      var reveal = p.revealAlpha;

      // Color: gray -> blue based on compatibility, modulated by reveal
      var connGlow = Math.min(1, p.conn / 0.7);

      // Remap compatibility for stronger visual contrast
      // compat ranges from 0.5 (least compatible, value=0 or 1) to 1.0 (most, value=0.5)
      // Remap to 0-1 scale where low compat is clearly gray, high is clearly blue
      var compatVis = Math.max(0, (compat - 0.5) * 2); // 0-1 remapped
      compatVis = compatVis * compatVis; // square for more contrast — low stays gray

      // Base gray (with slight warm tint for low compat)
      var gr = 100, gg = 100, gb = 100;
      // Low compat: slightly reddish gray
      var lr = 120, lg = 90, lb = 85;
      // High compat: blue
      var hr = 70, hg = 150, hb = 255;

      // Blend: gray/warm → blue based on compatVis, modulated by reveal
      var colorT = reveal * compatVis;
      var warmT = reveal * (1 - compatVis) * 0.4; // slight warm tint for incompatible
      var r = Math.round(lerp(lerp(gr, lr, warmT), hr, colorT));
      var g = Math.round(lerp(lerp(gg, lg, warmT), hg, colorT));
      var b = Math.round(lerp(lerp(gb, lb, warmT), hb, colorT));

      // Breathing
      var breath = Math.sin(time * p.breathSpeed + p.phase) * 0.06;
      var rad = pRad * (1 + breath);

      // Connection glow
      if (connGlow > 0.08) {
        var glowRad = rad + 2 + connGlow * 8;
        var grd = ctx.createRadialGradient(p.x, p.y, rad, p.x, p.y, glowRad);
        grd.addColorStop(0, 'rgba(107, 148, 255, ' + (connGlow * 0.3) + ')');
        grd.addColorStop(1, 'rgba(107, 148, 255, 0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, glowRad, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      }

      // Core circle
      ctx.beginPath();
      ctx.arc(p.x, p.y, rad, 0, Math.PI * 2);
      ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
      ctx.fill();
    }
  }

  function drawPlayer(time) {
    var o = openness();
    var pr = proxRadius();
    var pRad = playerRadius();

    // Proximity field glow
    var alpha = 0.03 + o * 0.07;
    var grd = ctx.createRadialGradient(
      player.x, player.y, pRad * 0.8,
      player.x, player.y, pr
    );
    grd.addColorStop(0, 'rgba(77, 204, 119, ' + (alpha * 1.2) + ')');
    grd.addColorStop(0.5, 'rgba(77, 204, 119, ' + (alpha * 0.5) + ')');
    grd.addColorStop(1, 'rgba(77, 204, 119, 0)');
    ctx.beginPath();
    ctx.arc(player.x, player.y, pr, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Proximity ring
    ctx.beginPath();
    ctx.arc(player.x, player.y, pr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(77, 204, 119, ' + (0.04 + o * 0.1) + ')';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Player breathing
    var breath = Math.sin(time * 0.6) * 0.05;
    var rad = pRad * (1 + breath);

    // Player circle
    var eFade = 0.35 + energyBar * 0.65;
    var green = Math.round(170 + energyBar * 85);
    ctx.beginPath();
    ctx.arc(player.x, player.y, rad, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(77, ' + green + ', 119, ' + eFade + ')';
    ctx.fill();

    // Edge highlight
    ctx.beginPath();
    ctx.arc(player.x, player.y, rad, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(120, ' + green + ', 140, ' + (0.4 + energyBar * 0.3) + ')';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Inner bright spot
    ctx.beginPath();
    ctx.arc(player.x - rad * 0.25, player.y - rad * 0.25, rad * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(200, 255, 220, ' + (0.1 + energyBar * 0.15) + ')';
    ctx.fill();
  }

  function drawBars() {
    var barW = 5;
    var barH = Math.min(90, H * 0.12);
    var gap = 8;
    var mr = Math.min(24, W * 0.04);
    var mt = Math.min(24, H * 0.03);
    var cr = 2.5;

    var bars = [
      { val: noveltyBar, color: [130, 130, 130] },
      { val: connectionBar, color: [107, 138, 255] },
      { val: energyBar, color: [77, 204, 119] },
    ];

    for (var i = 0; i < bars.length; i++) {
      var bx = W - mr - barW - (2 - i) * (barW + gap);
      var by = mt;

      // Background
      ctx.beginPath();
      ctx.roundRect(bx, by, barW, barH, cr);
      ctx.fillStyle = '#111';
      ctx.fill();

      // Fill
      var fh = barH * bars[i].val;
      if (fh > 0.5) {
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(bx, by, barW, barH, cr);
        ctx.clip();

        var c = bars[i].color;
        var grd = ctx.createLinearGradient(bx, by + barH, bx, by + barH - fh);
        grd.addColorStop(0, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ', 0.6)');
        grd.addColorStop(1, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ', 1)');
        ctx.fillStyle = grd;
        ctx.fillRect(bx, by + barH - fh, barW, fh);

        ctx.restore();
      }
    }
  }

  function render(time) {
    ctx.clearRect(0, 0, W, H);
    drawPeople(time / 1000);
    drawPlayer(time / 1000);
    drawBars();
  }

  // --- Slider visual feedback ---
  function updateSliderTrack() {
    var o = openness();
    var r = Math.round(26 + o * 50);
    var g = Math.round(26 + o * 10);
    var b = Math.round(26 + o * 55);
    slider.style.background = 'linear-gradient(90deg, #1a1a1a, rgb(' + r + ',' + g + ',' + b + '))';
  }
  slider.addEventListener('input', updateSliderTrack);

  // --- roundRect polyfill ---
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = [r, r, r, r];
      this.moveTo(x + r[0], y);
      this.lineTo(x + w - r[1], y);
      this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
      this.lineTo(x + w, y + h - r[2]);
      this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
      this.lineTo(x + r[3], y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
      this.lineTo(x, y + r[0]);
      this.quadraticCurveTo(x, y, x + r[0], y);
      this.closePath();
    };
  }

  // --- Main loop ---
  var lastTime = 0;

  function loop(time) {
    var dt = lastTime ? (time - lastTime) / 1000 : 1 / 60;
    lastTime = time;
    if (dt > 0.1) dt = 0.1;

    updatePhysics(dt);
    updatePlayer(dt);
    updateGameLogic(dt);
    render(time);
    requestAnimationFrame(loop);
  }

  // --- Init ---
  resize();
  window.addEventListener('resize', function() {
    resize();
  });
  generateWorld();
  updateSliderTrack();
  requestAnimationFrame(loop);
})();
</script>
</body>
