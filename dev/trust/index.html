<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TRUST</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; color: #ccc;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
}

#top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px;
  pointer-events: none;
}

.title {
  font-size: 11px; letter-spacing: 6px; color: #666;
  text-transform: uppercase;
}

#round-display {
  font-size: 13px; color: #555; letter-spacing: 2px;
}

#canvas-container {
  position: fixed; inset: 0;
}

canvas { display: block; }

/* ─── Bar history ─── */

#bar-history {
  position: fixed;
  bottom: 130px;
  left: 24px;
  right: 24px;
  height: 64px;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  overflow-x: auto;
  overflow-y: hidden;
  z-index: 10;
  pointer-events: none;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
#bar-history::-webkit-scrollbar { display: none; }

.bar {
  flex: 0 0 auto;
  width: 8px;
  min-height: 4px;
  border-radius: 2px 2px 0 0;
  opacity: 0.8;
}

/* ─── Controls ─── */

#controls {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: center; align-items: center;
  gap: 24px;
  padding: 28px;
  padding-bottom: max(28px, env(safe-area-inset-bottom, 28px));
}

.ctrl-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: #111; border: 2px solid #333;
  font-size: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { transform: scale(0.92); }
.btn-trust { border-color: #2a6e4a; color: #4ade80; }
.btn-trust:hover { background: #0a1f12; border-color: #4ade80; }
.btn-distrust { border-color: #6e2a2a; color: #f87171; }
.btn-distrust:hover { background: #1f0a0a; border-color: #f87171; }
.ctrl-btn.disabled { opacity: 0.2; pointer-events: none; }

/* ─── Result flash ─── */

#result-flash {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 20; font-size: 48px; color: #ccc;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  text-shadow: 0 0 40px rgba(255,255,255,0.3);
  text-align: center;
}
#result-sub {
  font-size: 12px; color: #666; letter-spacing: 3px;
  margin-top: 8px;
}

@media (max-width: 600px) {
  #top-bar { padding: 10px 16px; }
  .title { font-size: 9px; letter-spacing: 4px; }
  #controls { padding: 20px 16px; gap: 16px; }
  .ctrl-btn { width: 60px; height: 60px; font-size: 24px; }
  #bar-history { bottom: 110px; left: 16px; right: 16px; }
}
</style>
</head>
<body>

<div id="top-bar">
  <div class="title">Trust</div>
  <div id="round-display"></div>
</div>

<div id="canvas-container"></div>

<div id="bar-history"></div>

<div id="controls">
  <button class="ctrl-btn btn-trust" id="btn-trust">&#x2713;</button>
  <button class="ctrl-btn btn-distrust" id="btn-distrust">&#x2717;</button>
</div>

<div id="result-flash">
  <span id="result-number"></span>
  <div id="result-sub"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
<script type="module" src="story.js"></script>
</body>
</html>
