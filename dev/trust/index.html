<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TRUST</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; color: #ccc;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
}

#top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px;
  pointer-events: none;
}

#top-bar > * { pointer-events: auto; }

.title {
  font-size: 11px; letter-spacing: 6px; color: #666;
  text-transform: uppercase;
}

#score-display {
  font-size: 13px; color: #888; letter-spacing: 2px;
}
#score-value { color: #ff6b8a; }

#round-display {
  position: fixed; top: 44px; right: 24px; z-index: 10;
  font-size: 10px; color: #444; letter-spacing: 1px;
  pointer-events: none;
}

#person-label {
  position: fixed; top: 44px; left: 24px; z-index: 10;
  font-size: 10px; letter-spacing: 2px;
  pointer-events: none;
  transition: color 0.4s;
}

#canvas-container {
  position: fixed; inset: 0;
}

canvas { display: block; }

/* ─── Controls ─── */

#controls {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: center; align-items: center;
  gap: 24px;
  padding: 28px;
  padding-bottom: max(28px, env(safe-area-inset-bottom, 28px));
}

.ctrl-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: #111; border: 2px solid #333;
  font-size: 28px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { transform: scale(0.92); }
.btn-trust { border-color: #2a6e4a; color: #4ade80; }
.btn-trust:hover { background: #0a1f12; border-color: #4ade80; }
.btn-distrust { border-color: #6e2a2a; color: #f87171; }
.btn-distrust:hover { background: #1f0a0a; border-color: #f87171; }
.ctrl-btn.disabled { opacity: 0.2; pointer-events: none; }

/* ─── Result flash ─── */

#result-flash {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 20; font-size: 48px; color: #ff6b8a;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  text-shadow: 0 0 40px rgba(255,107,138,0.5);
  text-align: center;
}
#result-sub {
  font-size: 12px; color: #666; letter-spacing: 3px;
  margin-top: 8px;
}

/* ─── End screen ─── */

#end-screen {
  position: fixed; inset: 0; z-index: 30;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000;
}
#end-screen .end-title {
  font-size: 11px; letter-spacing: 6px; color: #555;
  margin-bottom: 32px;
}
#end-screen .end-score {
  font-size: 64px; color: #ff6b8a;
  text-shadow: 0 0 60px rgba(255,107,138,0.3);
}
#end-screen .end-label {
  font-size: 11px; color: #444; letter-spacing: 3px;
  margin-top: 8px;
}
#end-screen .end-breakdown {
  margin-top: 48px; font-size: 11px; color: #555;
  line-height: 2.2; text-align: center;
}
.person-name { letter-spacing: 2px; }
#end-screen .restart-btn {
  margin-top: 48px; padding: 12px 32px;
  background: #111; border: 1px solid #333;
  color: #888; font-family: inherit; font-size: 11px;
  letter-spacing: 3px; cursor: pointer;
  transition: all 0.2s;
}
#end-screen .restart-btn:hover {
  border-color: #ff6b8a; color: #ff6b8a;
}

@media (max-width: 600px) {
  #top-bar { padding: 10px 16px; }
  .title { font-size: 9px; letter-spacing: 4px; }
  #controls { padding: 20px 16px; gap: 16px; }
  .ctrl-btn { width: 60px; height: 60px; font-size: 24px; }
}
</style>
</head>
<body>

<div id="top-bar">
  <div class="title">Trust</div>
  <div id="score-display"><span id="score-value">0</span></div>
</div>
<div id="round-display"></div>
<div id="person-label"></div>

<div id="canvas-container"></div>

<div id="controls">
  <button class="ctrl-btn btn-trust" id="btn-trust">&#x2713;</button>
  <button class="ctrl-btn btn-distrust" id="btn-distrust">&#x2717;</button>
</div>

<div id="result-flash">
  <span id="result-number"></span>
  <div id="result-sub"></div>
</div>

<div id="end-screen">
  <div class="end-title">TRUST</div>
  <div class="end-score" id="end-total"></div>
  <div class="end-label">TOTAL</div>
  <div class="end-breakdown" id="end-breakdown"></div>
  <button class="restart-btn" id="restart-btn">AGAIN</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
<script type="module" src="story.js"></script>
</body>
</html>
